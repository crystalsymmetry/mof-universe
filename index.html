<style>
  :root{
    --bg:#02040a; --panel:rgba(22,18,10,0.86); --line:rgba(212,175,90,0.22);
    --gold:#d4af5a; --accent:#e0a020; --text:#f1e9d8; --muted:#9a8e74;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--text);}
  #scene{position:fixed;inset:0;display:block;cursor:grab;touch-action:none;}
  #scene:active{cursor:grabbing;}
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:baseline;gap:14px;
    padding:20px 24px;z-index:5;pointer-events:none;flex-wrap:wrap;}
  .topbar h1{font-family:Georgia,serif;font-weight:400;font-size:30px;letter-spacing:.5px;color:var(--text);}
  .topbar h1 a{color:inherit;text-decoration:none;pointer-events:auto;cursor:pointer;}
  .topbar h1 a:hover{opacity:.85;}
  .topbar h1 b{color:var(--gold);font-weight:400;}
  .topbar .sub{font-size:13px;color:var(--muted);letter-spacing:.5px;}
  .panel{position:fixed;left:24px;bottom:24px;z-index:5;background:var(--panel);
    backdrop-filter:blur(10px);border:.5px solid var(--line);border-radius:14px;
    padding:15px 17px;width:250px;}
  .panel .row{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
  .panel .row:last-child{margin-bottom:0;}
  .panel label{font-size:12px;color:var(--muted);min-width:42px;letter-spacing:.4px;}
  .panel input[type=range]{flex:1;accent-color:var(--accent);}
  .btn{background:transparent;color:var(--text);border:.5px solid var(--line);
    border-radius:9px;padding:6px 11px;font-size:13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:.15s;}
  .btn:hover{background:rgba(212,175,90,.10);border-color:rgba(212,175,90,.4);}
  .btn.active{border-color:var(--gold);color:var(--gold);}
  .legend{font-size:11px;color:var(--muted);line-height:1.9;margin-top:5px;
    border-top:.5px solid var(--line);padding-top:10px;}
  .legend .it{display:flex;align-items:center;gap:7px;cursor:pointer;opacity:1;transition:.15s;}
  .legend .it.off{opacity:.32;}
  .legend .dot{display:block;width:9px;height:9px;min-width:9px;border-radius:50%;flex:0 0 9px;box-sizing:border-box;}
  .legend .it span:not(.dot):not(.ring){flex:1;}
  .legend .it b{font-variant-numeric:tabular-nums;color:var(--text);font-weight:400;}
  .legend .note{margin-top:8px;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .legend .note span:not(.ring){flex:1;}
  .legend .ring{display:block;width:9px;height:9px;min-width:9px;border-radius:50%;border:1.5px solid var(--gold);flex:0 0 9px;box-sizing:border-box;}
  .info{position:fixed;right:24px;top:50%;transform:translateY(-50%) translateX(20px);
    z-index:6;width:248px;opacity:0;pointer-events:none;transition:.35s;
    background:var(--panel);backdrop-filter:blur(10px);border:.5px solid var(--line);
    border-left:2px solid var(--gold);border-radius:0 14px 14px 0;padding:17px 19px;}
  .info.show{opacity:1;transform:translateY(-50%) translateX(0);pointer-events:auto;}
  .info .closebtn{position:absolute;top:8px;right:10px;background:transparent;border:none;
    color:var(--muted);font-size:20px;line-height:1;cursor:pointer;padding:2px 6px;border-radius:6px;}
  .info .closebtn:hover{color:var(--text);background:rgba(212,175,90,.12);}
  .info .k{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
  .info .name{font-family:Georgia,serif;font-size:17px;margin:7px 0 4px;line-height:1.3;color:var(--text);}
  .info .pi{font-size:13px;color:var(--text);margin:6px 0 2px;}
  .info .meta{font-size:12px;color:var(--muted);line-height:1.6;}
  .info .field{font-size:12px;color:var(--text);line-height:1.5;margin-top:9px;}
  .info .field .fl{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
  .info .links{margin-top:11px;display:flex;flex-wrap:wrap;gap:7px;}
  .info .links a{font-size:11px;color:var(--gold);text-decoration:none;
    border:.5px solid var(--line);border-radius:7px;padding:3px 9px;transition:.15s;}
  .info .links a:hover{background:rgba(212,175,90,.12);border-color:rgba(212,175,90,.5);}
  .search{position:fixed;top:20px;right:24px;z-index:7;width:260px;}
  .search input{width:100%;background:var(--panel);backdrop-filter:blur(10px);
    border:.5px solid var(--line);border-radius:10px;color:var(--text);
    padding:9px 13px;font-size:13px;outline:none;font-family:inherit;}
  .search input:focus{border-color:rgba(212,175,90,.5);}
  .search input::placeholder{color:var(--muted);}
  .results{margin-top:6px;background:var(--panel);backdrop-filter:blur(10px);
    border:.5px solid var(--line);border-radius:10px;overflow:hidden;display:none;
    max-height:280px;overflow-y:auto;}
  .results.show{display:block;}
  .results .r{padding:8px 13px;font-size:12px;cursor:pointer;border-bottom:.5px solid var(--line);
    transition:.12s;}
  .results .r:last-child{border-bottom:none;}
  .results .r:hover{background:rgba(212,175,90,.10);}
  .results .r .rn{color:var(--text);}
  .results .r .rt{color:var(--muted);font-size:11px;}
  @media(max-width:600px){.search{display:none;}}
  .hint{position:fixed;bottom:24px;right:24px;z-index:5;font-size:11px;color:var(--muted);
    text-align:right;line-height:1.8;letter-spacing:.3px;}
  .hint kbd{background:rgba(212,175,90,.10);border:.5px solid var(--line);border-radius:5px;
    padding:1px 6px;font-family:inherit;font-size:10px;color:var(--text);}
  .hint .backlink{margin-top:8px;}
  .hint .backlink a{color:var(--gold);text-decoration:none;border-bottom:.5px solid rgba(212,175,90,.3);padding-bottom:1px;}
  .hint .backlink a:hover{border-bottom-color:var(--gold);}
  @media(max-width:600px){.info{display:none;}.panel{left:12px;right:12px;bottom:12px;width:auto;}
    .hint{display:none;}.topbar{padding:14px;}}
</style>
</head>

const CATS = {
  nobel:    {col:'#e86ab8', label:'Nobel laureate'},
  basic:    {col:'#5bb6f5', label:'Basic entry'},
  extended: {col:'#f5a623', label:'Extended entry'},
  company:  {col:'#9ccc65', label:'MOF company'},
  rip:      {col:'#cfcfcf', label:'In memoriam'}
};
const order = ['nobel','basic','extended','company','rip'];
const GOLD='#d4af5a';

const cv = document.getElementById('scene');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=Math.min(devicePixelRatio||1,2);
function resize(){
  W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();addEventListener('resize',resize);

let rotY=0, rotX=0.30, zoom=1, spinning=true, speed=0.04;
let driftX=0.0014, driftY=0;
let panX=0, panY=0;
let dragging=false,px=0,py=0,vX=0,vY=0,down=false,downX=0,downY=0,moved=false;

function radius(){ return Math.min(W,H)*0.36*zoom; }
function center(){ return {cx:W/2+panX, cy:H/2+panY}; }

function rotate(lat,lng){
  const la=lat*Math.PI/180, lo=lng*Math.PI/180;
  let x=Math.cos(la)*Math.sin(lo), y=Math.sin(la), z=Math.cos(la)*Math.cos(lo);
  const cy1=Math.cos(rotY),sy1=Math.sin(rotY);
  let x1=x*cy1+z*sy1, z1=-x*sy1+z*cy1, y1=y;
  const cx1=Math.cos(rotX),sx1=Math.sin(rotX);
  let y2=y1*cx1-z1*sx1, z2=y1*sx1+z1*cx1, x2=x1;
  return {x:x2,y:y2,z:z2};
}
function project(p){
  const r=radius(),c=center();
  return {sx:c.cx+p.x*r, sy:c.cy-p.y*r, z:p.z};
}

function drawSphereBase(){
  const r=radius(),c=center();
  ctx.beginPath();ctx.arc(c.cx,c.cy,r,0,Math.PI*2);
  ctx.fillStyle='#070f1f';ctx.fill();
  // deep-blue radial shading: lit upper-left, darker toward the limb
  const g=ctx.createRadialGradient(c.cx-r*0.38,c.cy-r*0.40,r*0.05,c.cx,c.cy,r);
  g.addColorStop(0,'#13243f');
  g.addColorStop(0.55,'#0c1729');
  g.addColorStop(1,'#04080f');
  ctx.fillStyle=g;ctx.fill();
}

// Draw a lat/lng path as gold segments, BREAKING at the horizon (no closePath across sphere)
function strokePath(points,isLatLng,closed){
  let started=false;
  ctx.beginPath();
  const n=points.length;
  for(let i=0;i<=n;i++){
    const idx=i%n;
    if(i===n && !closed) break;
    const pt=points[idx];
    const p=rotate(pt[1],pt[0]); // [lng,lat]
    if(p.z>0.0){
      const s=project(p);
      if(!started){ctx.moveTo(s.sx,s.sy);started=true;}
      else ctx.lineTo(s.sx,s.sy);
    } else {
      started=false; // break the line at the horizon
    }
  }
  ctx.stroke();
}

function drawLand(){
  ctx.strokeStyle='rgba(222,186,104,0.85)';
  ctx.lineWidth=0.8;ctx.lineJoin='round';ctx.lineCap='round';
  for(const poly of LAND){ strokePath(poly,true,false); }
}

function drawGraticule(){
  ctx.strokeStyle='rgba(212,175,90,0.20)';
  ctx.lineWidth=0.5;
  // meridians every 15°
  for(let lo=-180;lo<180;lo+=15){
    let pts=[];for(let la=-90;la<=90;la+=3)pts.push([lo,la]);
    strokePath(pts,true,false);
  }
  // parallels every 15°
  for(let la=-75;la<=75;la+=15){
    let pts=[];for(let lo=-180;lo<=180;lo+=3)pts.push([lo,la]);
    strokePath(pts,true,false);
  }
}

function drawRim(){
  const r=radius(),c=center();
  // thin crisp gold rim line
  ctx.beginPath();ctx.arc(c.cx,c.cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(224,188,110,0.65)';ctx.lineWidth=1.0;ctx.stroke();
  // narrow glow strictly OUTSIDE the sphere so it doesn't tint the disc
  const g=ctx.createRadialGradient(c.cx,c.cy,r*1.002,c.cx,c.cy,r*1.05);
  g.addColorStop(0,'rgba(212,175,90,0.16)');
  g.addColorStop(1,'rgba(212,175,90,0)');
  ctx.beginPath();ctx.arc(c.cx,c.cy,r*1.05,0,Math.PI*2);
  ctx.arc(c.cx,c.cy,r,0,Math.PI*2,true);
  ctx.fillStyle=g;ctx.fill('evenodd');
}

const baseR={basic:2.0,extended:2.0,company:2.6,nobel:4.0,rip:2.6};
const filterOff={};
let projected=[];
let hoverIdx=-1, mouseX=-1, mouseY=-1;
let selectedIdx=-1, selPulse=0;
let flyTarget=null;
let t=0;
function drawMarkers(){
  projected=[];
  const list=[];
  for(let i=0;i<SITES.length;i++){
    const s=SITES[i];
    if(filterOff[s.c])continue;
    const p=rotate(s.lat,s.lng);
    if(p.z>0.02){ list.push({i,p,s}); }
  }
  list.sort((a,b)=>a.p.z-b.p.z);
  for(const o of list){
    const sp=project(o.p);
    const cat=CATS[o.s.c]||CATS.basic;
    let zScale = Math.min(Math.sqrt(zoom),2.6);
    if(zoom>12) zScale = Math.max(2.6*Math.sqrt(12/zoom), 0.5);
    let rad=(baseR[o.s.c]||2.0)*(0.6+o.p.z*0.6)*zScale;
    if(o.s.c==='nobel'){ rad*=(1+Math.sin(t*3)*0.25);
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,rad*2.4,0,Math.PI*2);
      ctx.fillStyle=cat.col;ctx.globalAlpha=0.16+0.10*Math.sin(t*3);ctx.fill();ctx.globalAlpha=1;
    } else if(o.s.c==='company'){
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,rad*1.9,0,Math.PI*2);
      ctx.fillStyle=cat.col;ctx.globalAlpha=0.14;ctx.fill();ctx.globalAlpha=1;
    }
    ctx.beginPath();ctx.arc(sp.sx,sp.sy,rad,0,Math.PI*2);
    ctx.fillStyle=cat.col;ctx.globalAlpha=0.6+o.p.z*0.4;ctx.fill();ctx.globalAlpha=1;
    // hover: dezentes Aufleuchten
    if(o.i===hoverIdx){
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,rad*2.8,0,Math.PI*2);
      ctx.fillStyle=cat.col;ctx.globalAlpha=0.22;ctx.fill();ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,rad*1.35,0,Math.PI*2);
      ctx.strokeStyle='#fff';ctx.lineWidth=1.0;ctx.globalAlpha=0.8;ctx.stroke();ctx.globalAlpha=1;
    }
    // enriched: dezenter goldener Ring
    if(o.s.rich){
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,rad+2.6,0,Math.PI*2);
      ctx.strokeStyle=GOLD;ctx.lineWidth=1.0;ctx.globalAlpha=0.7+o.p.z*0.3;ctx.stroke();ctx.globalAlpha=1;
    }
    // selected (search hit): kräftige pulsierende Hervorhebung
    if(o.i===selectedIdx){
      const pr=Math.max(rad,4);
      // expandierender Ping-Ring
      const ph=(selPulse%1);
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,pr+4+ph*22,0,Math.PI*2);
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;ctx.globalAlpha=(1-ph)*0.7;ctx.stroke();ctx.globalAlpha=1;
      // zweiter, versetzter Ping
      const ph2=((selPulse+0.5)%1);
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,pr+4+ph2*22,0,Math.PI*2);
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;ctx.globalAlpha=(1-ph2)*0.5;ctx.stroke();ctx.globalAlpha=1;
      // fester weißer Außenring + heller Kern
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,pr+3,0,Math.PI*2);
      ctx.strokeStyle='#ffffff';ctx.lineWidth=2.0;ctx.globalAlpha=0.95;ctx.stroke();ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,pr*1.5,0,Math.PI*2);
      ctx.fillStyle='#ffffff';ctx.globalAlpha=0.85;ctx.fill();ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(sp.sx,sp.sy,pr*0.8,0,Math.PI*2);
      ctx.fillStyle=cat.col;ctx.globalAlpha=1;ctx.fill();
    }
    projected.push({sx:sp.sx,sy:sp.sy,rad:Math.max(rad,5),i:o.i});
  }
}

function frame(){
  requestAnimationFrame(frame);
  t+=0.016;
  selPulse+=0.018;
  if(flyTarget){
    // kürzesten Weg für rotY wählen
    let dRy=flyTarget.ry-rotY;
    while(dRy>Math.PI)dRy-=2*Math.PI; while(dRy<-Math.PI)dRy+=2*Math.PI;
    rotY+=dRy*0.12; rotX+=(flyTarget.rx-rotX)*0.12;
    flyTarget.frames++;
    if(Math.abs(dRy)<0.01 && Math.abs(flyTarget.rx-rotX)<0.01 || flyTarget.frames>90){
      const idx=flyTarget.idx; flyTarget=null; hoverIdx=idx; showInfoFor(idx);
    }
  } else if(spinning&&!dragging){
    // Dauerdrift in zuletzt gedragter Richtung; Geschwindigkeit am aktuellen Zoom normiert
    rotY += driftX*speed*8/zoom;
    rotX = Math.max(-1.35,Math.min(1.35, rotX + driftY*speed*8/zoom));
    // vertikale Drift sehr langsam abklingen lassen (Diagonale bleibt lange erhalten)
    driftY *= 0.997;
  }
  if(!dragging&&!flyTarget){
    // anfänglichen Schwung sanft ausklingen lassen (zusätzlich zur Dauerdrift)
    rotY+=vX; rotX=Math.max(-1.35,Math.min(1.35,rotX+vY)); vX*=0.93; vY*=0.90;
    if(Math.abs(vX)<0.0006) vX=0;
    if(Math.abs(vY)<0.0006) vY=0;
  }
  ctx.clearRect(0,0,W,H);
  drawSphereBase();
  drawGraticule();
  drawLand();
  drawRim();
  drawMarkers();
}
frame();

const leg=document.getElementById('legend');
const counts={};SITES.forEach(s=>counts[s.c]=(counts[s.c]||0)+1);
order.forEach(k=>{ if(!counts[k])return; const c=CATS[k];
  const it=document.createElement('div');it.className='it';it.dataset.cat=k;
  it.innerHTML='<span class="dot" style="background:'+c.col+';box-shadow:0 0 6px '+c.col+'"></span><span>'+c.label+'</span><b>'+counts[k]+'</b>';
  it.onclick=()=>{filterOff[k]=!filterOff[k];it.classList.toggle('off',filterOff[k]);};
  leg.appendChild(it);
});
const note=document.createElement('div');note.className='note';
note.innerHTML='<span class="ring"></span><span>Gold ring = detailed entry</span>';
leg.appendChild(note);

cv.addEventListener('pointerdown',e=>{dragging=true;down=true;moved=false;px=downX=e.clientX;py=downY=e.clientY;});
addEventListener('pointerup',e=>{
  if(dragging){
    // vollständige Drag-Richtung (horizontal + vertikal) als Dauerdrift übernehmen
    const mag=Math.hypot(vX,vY);
    if(mag>0.0001){
      // Richtungsvektor mit fester Stärke; die Zoom-Skalierung passiert im Render-Loop
      const target=0.0016;
      driftX = vX/mag*target;
      driftY = vY/mag*target;
      // horizontale Mindestdrift sichern, damit die Kugel nie stehenbleibt
      const minH=0.0006;
      if(Math.abs(driftX)<minH) driftX = (driftX>=0?1:-1)*minH;
      spinning = true;
      const sp=document.getElementById('spin');
      sp.classList.add('active');
      sp.querySelector('span').innerHTML='&#9208;';
    }
  }
  dragging=false;if(down&&!moved&&e.target===cv)pick(e);down=false;
});
addEventListener('pointermove',e=>{if(dragging){const dx=e.clientX-px,dy=e.clientY-py;
  if(Math.abs(e.clientX-downX)>4||Math.abs(e.clientY-downY)>4){moved=true;if(cv.setPointerCapture&&!cv.hasPointerCapture(e.pointerId)){try{cv.setPointerCapture(e.pointerId);}catch(_){}}}
  const k=0.006/zoom;
  rotY+=dx*k;rotX=Math.max(-1.35,Math.min(1.35,rotX+dy*k));vX=dx*k;vY=dy*k;px=e.clientX;py=e.clientY;}});
cv.addEventListener('pointermove',e=>{
  if(dragging){hoverIdx=-1;return;}
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let best=-1,bd=1e9;
  for(const p of projected){const d=Math.hypot(p.sx-mx,p.sy-my);if(d<p.rad+4&&d<bd){bd=d;best=p.i;}}
  hoverIdx=best;
  cv.style.cursor=best>=0?'pointer':'grab';
});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const oldZoom=zoom;
  const nz=Math.max(0.7,Math.min(500,zoom*(1-e.deltaY*0.0012)));
  const f=nz/oldZoom;
  // Mitte so verschieben, dass der Punkt unter dem Cursor an seiner Stelle bleibt
  const cx=W/2+panX, cy=H/2+panY;
  panX += (mx-cx)*(1-f);
  panY += (my-cy)*(1-f);
  zoom=nz;
},{passive:false});

const info=document.getElementById('info');
function pick(e){
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  let best=null,bd=1e9;
  for(const p of projected){
    const d=Math.hypot(p.sx-mx,p.sy-my);
    if(d<p.rad+4 && d<bd){bd=d;best=p;}
  }
  if(best){ const s=SITES[best.i],c=CATS[s.c]||CATS.basic;
    document.getElementById('ik').textContent=c.label;
    document.getElementById('ik').style.color=c.col;
    info.style.borderLeftColor=c.col;
    document.getElementById('iname').textContent=s.n;
    const piEl=document.getElementById('ipi');
    if(s.pi){ piEl.textContent=s.pi; piEl.style.display='block'; }
    else { piEl.style.display='none'; }
    let meta='';
    if(s.town){ meta=s.town; }
    meta += (meta?'  ·  ':'')+'Lat '+s.lat.toFixed(2)+'\u00b0, Lng '+s.lng.toFixed(2)+'\u00b0';
    document.getElementById('imeta').textContent=meta;
    // links
    const fEl=document.getElementById('ifield');
    if(s.field){ fEl.innerHTML='<span class="fl">Primary field</span>'+s.field; fEl.style.display='block'; }
    else fEl.style.display='none';
    const lc=document.getElementById('ilinks');lc.innerHTML='';
    const L=[['Website',s.w1],['Group site',s.w2],['X',s.tw],['Bluesky',s.bs],['LinkedIn',s.li]];
    for(const [lab,url] of L){ if(url&&/^https?:\/\//.test(url)){ const a=document.createElement('a');
      a.textContent=lab;a.href=url;a.target='_blank';a.rel='noopener';lc.appendChild(a); } }
    info.classList.add('show');
  }
}
document.getElementById('iclose').onclick=()=>{info.classList.remove('show');selectedIdx=-1;};

document.getElementById('spin').onclick=function(){spinning=!spinning;this.classList.toggle('active',spinning);
  this.querySelector('span').innerHTML=spinning?'&#9208;':'&#9654;';};
document.getElementById('speed').oninput=function(){speed=this.value/100;};
document.getElementById('reset').onclick=()=>{rotX=0.30;rotY=0;zoom=1;panX=0;panY=0;driftX=0.0014;driftY=0;vX=0;vY=0;info.classList.remove('show');selectedIdx=-1;};

// ---- search ----
const qEl=document.getElementById('q'), resEl=document.getElementById('results');
function flyTo(idx){
  const s=SITES[idx];
  // target rotation so the point faces front (z=1, y aligned to tilt)
  const targetRotY = -s.lng*Math.PI/180;
  const targetRotX = s.lat*Math.PI/180;
  flyTarget={rx:Math.max(-1.3,Math.min(1.3,targetRotX)),ry:targetRotY,idx,frames:0};
  selectedIdx=idx; selPulse=0;
  panX=0; panY=0;
  // falls der Treffer ausgefiltert ist, Kategorie wieder einblenden
  if(filterOff[s.c]){ filterOff[s.c]=false;
    document.querySelectorAll('.legend .it').forEach(it=>{ if(it.dataset&&it.dataset.cat===s.c) it.classList.remove('off'); });
  }
  spinning=false;
  document.getElementById('spin').classList.remove('active');
  document.getElementById('spin').querySelector('span').innerHTML='&#9654;';
}
function showInfoFor(idx){
  const s=SITES[idx],c=CATS[s.c]||CATS.basic;
  document.getElementById('ik').textContent=c.label;
  document.getElementById('ik').style.color=c.col;
  info.style.borderLeftColor=c.col;
  document.getElementById('iname').textContent=s.n;
  const piEl=document.getElementById('ipi');
  if(s.pi){piEl.textContent=s.pi;piEl.style.display='block';}else piEl.style.display='none';
  let meta=s.town?s.town:'';
  meta+=(meta?'  \u00b7  ':'')+'Lat '+s.lat.toFixed(2)+'\u00b0, Lng '+s.lng.toFixed(2)+'\u00b0';
  document.getElementById('imeta').textContent=meta;
  const fEl=document.getElementById('ifield');
  if(s.field){fEl.innerHTML='<span class="fl">Primary field</span>'+s.field;fEl.style.display='block';}
  else fEl.style.display='none';
  const lc=document.getElementById('ilinks');lc.innerHTML='';
  const L=[['Website',s.w1],['Group site',s.w2],['X',s.tw],['Bluesky',s.bs],['LinkedIn',s.li]];
  for(const [lab,url] of L){if(url&&/^https?:\/\//.test(url)){const a=document.createElement('a');a.textContent=lab;a.href=url;a.target='_blank';a.rel='noopener';lc.appendChild(a);}}
  info.classList.add('show');
}
qEl.addEventListener('input',()=>{
  const q=qEl.value.trim().toLowerCase();
  resEl.innerHTML='';
  if(q.length<2){resEl.classList.remove('show');return;}
  const hits=[];
  for(let i=0;i<SITES.length;i++){
    const s=SITES[i];
    const hay=((s.n||'')+' '+(s.pi||'')+' '+(s.town||'')).toLowerCase();
    if(hay.includes(q)) hits.push(i);
    if(hits.length>=40)break;
  }
  if(!hits.length){resEl.classList.remove('show');return;}
  hits.forEach(i=>{const s=SITES[i];const d=document.createElement('div');d.className='r';
    d.innerHTML='<div class="rn">'+(s.pi||s.n)+'</div><div class="rt">'+(s.pi?s.n+(s.town?' · '+s.town:''):(s.town||''))+'</div>';
    d.onclick=()=>{flyTo(i);resEl.classList.remove('show');qEl.value=s.pi||s.n;};
    resEl.appendChild(d);});
  resEl.classList.add('show');
});
document.addEventListener('click',e=>{if(!document.getElementById('searchbox').contains(e.target))resEl.classList.remove('show');});
</script>
</body>
